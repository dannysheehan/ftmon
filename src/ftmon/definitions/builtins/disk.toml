# FTMON built-in: disk space + filling detection (SPEC 7.7.4)
# The "filling" rule is the legacy FTMON monotonic test: sustained growth,
# even slow, gets flagged before the thresholds trip.
schema = 1

# NOTE: exempt is a top-level key, so it must appear BEFORE the first [table]
# header - TOML binds bare keys to the most recently opened table otherwise.
exempt = [ 'matches(fstype, "^(tmpfs|iso9660|squashfs|overlay)$")' ]

[monitor]
name = "disk"
description = "Disk space thresholds, inode thresholds, and filling-rate detection"
version = 1
enabled = true
platforms = ["linux"]
interval = "60s"
source = "disk"

[parameters]
space_notice_pct = { value = 85, doc = "Notice threshold, percent used" }
space_warn_pct = { value = 92, doc = "Warning threshold, percent used" }
space_crit_pct = { value = 97, doc = "Error threshold, percent used" }
inode_notice_pct = { value = 75, doc = "Notice threshold, percent inodes used" }
inode_warn_pct = { value = 80, doc = "Warning threshold, percent inodes used" }
inode_crit_pct = { value = 90, doc = "Error threshold, percent inodes used" }
filling_frac = { value = 0.85, doc = "Fraction of consecutive growth samples (70m) that counts as filling" }

[[derived]]
name = "filling"
expr = 'monot(used_bytes, "70m")'

[[derived]]
# Hours until full at the current 70m growth rate; huge when not growing.
name = "full_in_h"
expr = 'free_bytes / clamp(slope(used_bytes, "70m") * 3600, 1, 1000000000000000)'

# --- space ladder (one incident per mount, IN-03) ---
[[rule]]
id = "space-notice"
group = "space"
when = 'used_pct > space_notice_pct'
severity = "notice"
confirm_cycles = 3
message = "Disk {entity} at {used_pct:.0f}% used"

[[rule]]
id = "space-warn"
group = "space"
when = 'used_pct > space_warn_pct'
severity = "warning"
confirm_cycles = 3
message = "Disk {entity} at {used_pct:.0f}% used"

[[rule]]
id = "space-crit"
group = "space"
when = 'used_pct > space_crit_pct'
severity = "error"
confirm_cycles = 2
message = "Disk {entity} nearly full: {used_pct:.0f}% used, {free_mb:.0f} MB left"

# Baseline-relative alternative (silent until ~24h of learning, CA-05):
# [[rule]]
# id = "space-baseline"
# group = "space"
# when = 'free_bytes < baseline(free_bytes) * 0.3'
# severity = "warning"
# confirm_cycles = 3
# message = "Disk {entity} well below its normal free space"

# --- inode ladder ---
[[rule]]
id = "inodes-notice"
group = "inodes"
when = 'inode_used_pct > inode_notice_pct'
severity = "notice"
confirm_cycles = 3
message = "Inodes on {entity} at {inode_used_pct:.0f}%"

[[rule]]
id = "inodes-warn"
group = "inodes"
when = 'inode_used_pct > inode_warn_pct'
severity = "warning"
confirm_cycles = 3
message = "Inodes on {entity} at {inode_used_pct:.0f}%"

[[rule]]
id = "inodes-crit"
group = "inodes"
when = 'inode_used_pct > inode_crit_pct'
severity = "error"
confirm_cycles = 2
message = "Inodes on {entity} nearly exhausted: {inode_used_pct:.0f}%"

# --- filling (legacy monotonic test) ---
[[rule]]
id = "filling"
group = "filling"
when = 'filling >= filling_frac and used_pct > 50'
severity = "warning"
confirm_cycles = 3
message = "Disk {entity} filling steadily; full in ~{full_in_h:.1f} h at current rate"

[[derived]]
name = "free_mb"
expr = 'free_bytes / MB'
