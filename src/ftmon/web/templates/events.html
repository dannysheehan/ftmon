{% extends "base.html" %}{% block content %}<h1>Events</h1><form method="get"><label>Minimum severity <select name="severity">{% for n in range(5) %}<option value="{{ n }}" {{ 'selected' if n == severity else '' }}>{{ severity_name(n) }}</option>{% endfor %}</select></label><label>Provider <input name="provider"></label><button>Filter</button></form><table><thead><tr><th>Severity</th><th>Provider</th><th>Message</th></tr></thead><tbody>{% for row in rows %}<tr><td><span class="sev sev-{{ severity_name(row.severity) }}">▲ {{ severity_name(row.severity) }}</span></td><td>{{ row.provider }}</td><td>{{ row.message }}</td></tr>{% else %}<tr><td colspan="3">No events</td></tr>{% endfor %}</tbody></table>{% endblock %}
