{% extends "base.html" %}{% block content %}<h1>Metrics explorer</h1><form method="get"><label>Monitor <input name="monitor" value="{{ params.get('monitor','') }}"></label><label>Entity <input name="entity" value="{{ params.get('entity','') }}"></label><label>Metric <input name="metric" value="{{ params.get('metric','') }}"></label><label>Hours <input name="hours" type="number" min="0.25" max="9600" value="{{ params.get('hours','24') }}"></label><button>Explore</button></form>
{% for s in series %}<figure class="chart" data-points='{{ s.points|tojson }}'><svg role="img" aria-label="{{ s.entity }} {{ params.get('metric','metric') }} chart" viewBox="0 0 800 180"></svg><figcaption>{% if s.points %}Current value {{ s.points[-1][1] }}; trend {% if s.points|length < 2 %}unavailable{% elif s.points[-1][1] > s.points[0][1] %}rising{% elif s.points[-1][1] < s.points[0][1] %}falling{% else %}steady{% endif %}. {{ s.points|length }} points at {{ s.resolution }} resolution.{% else %}No values in this range.{% endif %}</figcaption></figure>{% else %}<p>Choose a monitor and metric. Available series: {{ choices|length }}.</p>{% endfor %}{% endblock %}
