{% extends "base.html" %}{% block content %}<h1>Metrics explorer</h1><p>Inspect any individual persisted series, including metrics without a curated Trend profile.</p><form method="get" action="/metrics" data-metric-form><label>Monitor <select name="monitor" data-metric-monitor>{% for item in monitors %}<option {{ 'selected' if item == selected.monitor else '' }}>{{ item }}</option>{% endfor %}</select></label><label>Entity <select name="entity" data-metric-entity>{% for item in entities %}<option {{ 'selected' if item == selected.entity else '' }}>{{ item }}</option>{% endfor %}</select></label><label>Metric <select name="metric">{% for item in metrics %}<option {{ 'selected' if item == selected.metric else '' }}>{{ item }}</option>{% endfor %}</select></label><label>Range <select name="range">{% for item in ['6h','24h','7d','30d','90d','400d'] %}<option {{ 'selected' if item == selected.range else '' }}>{{ item }}</option>{% endfor %}</select></label><label>Rollup value <select name="statistic">{% for item in ['avg','min','max','last'] %}<option {{ 'selected' if item == selected.statistic else '' }}>{{ item }}</option>{% endfor %}</select></label><button>Explore</button></form>
{% for s in series %}<figure class="chart" data-points='{{ s.points|tojson }}'><svg role="img" aria-label="{{ s.entity }} {{ selected.metric or 'metric' }} chart" viewBox="0 0 800 180"></svg><figcaption>{% if s.points %}Current value {{ s.points[-1][1] }}; trend {% if s.points|length < 2 %}unavailable{% elif s.points[-1][1] > s.points[0][1] %}rising{% elif s.points[-1][1] < s.points[0][1] %}falling{% else %}steady{% endif %}. {{ s.points|length }} points at {{ s.resolution }} resolution using {{ selected.statistic }}.{% else %}No values in this range.{% endif %}</figcaption></figure>{% else %}<p>No persisted metric series are available yet.</p>{% endfor %}{% endblock %}
