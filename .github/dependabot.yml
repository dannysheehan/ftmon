# Weekly version bumps for the Python lockfile and GitHub Actions pins.
# Security updates are enabled separately via Dependabot alerts and stay
# ungrouped so they can be merged promptly.
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      python-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "ftmon"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # One weekly PR for all Action pin bumps instead of a spray of majors.
      github-actions:
        patterns:
          - "*"
