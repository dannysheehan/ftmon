# Tag-driven release: v* tags run the full gate, build sdist+wheel, publish
# to PyPI via Trusted Publishing (OIDC - no stored API tokens), then attach
# the artifacts to a GitHub Release. The PyPI side requires a (pending)
# trusted publisher registered for project "ftmon" with this repository,
# workflow file "release.yml", and environment "pypi".
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - run: uv sync --locked
      - run: uv run ruff check src tests
      - run: uv run pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - run: uv build --clear
      - name: Verify packaged authoring guides
        run: |
          uv run --isolated --no-project --with ./dist/ftmon-*.whl python - <<'PY'
          from ftmon.mcp_server import _guide_text

          expected = {
              "definitions": "complete reference",
              "check-authoring": "Writing an external check",
              "external-checks": "privileged exporter pattern",
          }
          for name, marker in expected.items():
              assert marker in _guide_text(name)
          PY
      # The tag must match the built version so PyPI, the GitHub Release,
      # and `ftmon --version` can never disagree.
      - name: Check tag matches package version
        run: |
          version=$(uv run python -c "import ftmon; print(ftmon.__version__)")
          test "v${version}" = "${GITHUB_REF_NAME}" || {
            echo "tag ${GITHUB_REF_NAME} != package version v${version}" >&2
            exit 1
          }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ftmon
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "${GITHUB_REF_NAME}" in
            *a*|*b*|*rc*) prerelease="--prerelease" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes ${prerelease}
