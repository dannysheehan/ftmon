# The same gate contributors run locally (README "Development" section).
# Deterministic by design: realsystem tests are deselected by pytest defaults.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run ruff check src tests tools
      - run: uv run python tools/gen_reqindex.py --check
      - run: uv run pytest -q
      - run: uv build --clear
      - name: Verify packaged authoring guides
        run: |
          uv run --isolated --no-project --with ./dist/ftmon-*.whl python - <<'PY'
          from ftmon.mcp_server import _guide_text

          expected = {
              "definitions": "complete reference",
              "check-authoring": "Writing an external check",
              "external-checks": "privileged exporter pattern",
          }
          for name, marker in expected.items():
              assert marker in _guide_text(name)
          PY
