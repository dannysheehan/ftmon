# Recipe pull requests build the same inert artifact as main, but only a push to
# protected main can enter the Pages environment and obtain deploy permissions.
name: FTMON Exchange

on:
  push:
    branches: [main]
    paths:
      - "extra-monitors/**"
      - "exchange/**"
      - "tools/build_exchange.py"
      - "tests/exchange/**"
      - ".github/workflows/exchange.yml"
  pull_request:
    paths:
      - "extra-monitors/**"
      - "exchange/**"
      - "tools/build_exchange.py"
      - "tests/exchange/**"
      - ".github/workflows/exchange.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
      - run: uv sync --locked
      # The builder reads recipe data but never imports or executes catalogue
      # content; tests enforce that trust boundary before an artifact exists.
      - run: uv run ruff check tools/build_exchange.py tests/exchange tests/extra_monitors
      - run: uv run pytest -q tests/exchange tests/extra_monitors
      - run: uv run python tools/build_exchange.py --output dist/exchange
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: dist/exchange

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy tested artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
