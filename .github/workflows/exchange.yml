# Recipe pull requests build the same inert artifact as main, but only a push to
# protected main can enter the Pages environment and obtain deploy permissions.
name: FTMON Exchange

on:
  push:
    branches: [main]
    paths:
      - "extra-monitors/**"
      - "exchange/**"
      - "tools/build_exchange.py"
      - "tests/exchange/**"
      - ".github/workflows/exchange.yml"
  pull_request:
    paths:
      - "extra-monitors/**"
      - "exchange/**"
      - "tools/build_exchange.py"
      - "tests/exchange/**"
      - ".github/workflows/exchange.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.11"
      - run: uv sync --locked
      # The builder reads recipe data but never imports or executes catalogue
      # content; tests enforce that trust boundary before an artifact exists.
      - run: uv run ruff check tools/build_exchange.py tests/exchange tests/extra_monitors
      - run: uv run pytest -q tests/exchange tests/extra_monitors
      - run: uv run python tools/build_exchange.py --output dist/exchange
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/exchange

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy tested artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
