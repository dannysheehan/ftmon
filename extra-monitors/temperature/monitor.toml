schema = 1

[monitor]
name = "temperature"
description = "Hardware temperature via check_temperature (hottest thermal zone)"
version = 1
enabled = false
platforms = ["linux"]
interval = "60s"
source = "external"

[source_options]
check = "temperature"
entity = "thermal:max"

[[source_options.perfdata]]
label = "temp"
metric = "temp_celsius"
plugin_uom = "C"
unit = "celsius"
kind = "gauge"

[[rule]]
id = "plugin-warning"
group = "thermal"
when = "plugin_state == 1"
severity = "warning"
confirm_cycles = 3
message = "{plugin_message}"

[[rule]]
id = "plugin-critical"
group = "thermal"
when = "plugin_state == 2"
severity = "critical"
confirm_cycles = 3
message = "{plugin_message}"

[[rule]]
id = "plugin-unknown"
group = "check-health"
when = "plugin_state == 3"
severity = "warning"
confirm_cycles = 2
message = "Temperature check is unknown: {plugin_message}"
