schema = 1

[monitor]
name = "iowait"
description = "CPU I/O wait via check_iowait"
version = 2
enabled = false
platforms = ["linux"]
interval = "60s"
source = "external"

[source_options]
check = "iowait"
entity = "cpu:iowait"

[[source_options.perfdata]]
label = "cpu_iowait"
metric = "cpu_iowait_pct"
plugin_uom = "%"
unit = "percent"
kind = "gauge"

[[source_options.perfdata]]
label = "cpu_user"
metric = "cpu_user_pct"
plugin_uom = "%"
unit = "percent"
kind = "gauge"

[[source_options.perfdata]]
label = "cpu_system"
metric = "cpu_system_pct"
plugin_uom = "%"
unit = "percent"
kind = "gauge"

[[source_options.perfdata]]
label = "cpu_idle"
metric = "cpu_idle_pct"
plugin_uom = "%"
unit = "percent"
kind = "gauge"

[[source_options.perfdata]]
label = "cpu_steal"
metric = "cpu_steal_pct"
plugin_uom = "%"
unit = "percent"
kind = "gauge"

[parameters]
sustained_iowait_pct = { value = 15, doc = "Warn when 15m average iowait exceeds this percent" }

# The 15-minute average is the stable operator signal. Instantaneous plugin
# warning/critical values use a different window and are intentionally omitted.
[glance]
metric = "iowait_avg_15m"
unit = "percent"
aggregate = "max"
thresholds = [
  { label = "sustained", parameter = "sustained_iowait_pct" },
]

[[derived]]
name = "iowait_avg_15m"
expr = 'avg(cpu_iowait_pct, "15m")'

[[rule]]
id = "plugin-warning"
group = "iowait"
when = "plugin_state == 1"
severity = "warning"
confirm_cycles = 3
message = "{plugin_message}"

[[rule]]
id = "plugin-critical"
group = "iowait"
when = "plugin_state == 2"
severity = "critical"
confirm_cycles = 3
message = "{plugin_message}"

[[rule]]
id = "plugin-unknown"
group = "check-health"
when = "plugin_state == 3"
severity = "warning"
confirm_cycles = 2
message = "I/O wait check is unknown: {plugin_message}"

[[rule]]
id = "sustained-iowait"
group = "iowait-sustained"
when = "iowait_avg_15m > sustained_iowait_pct"
severity = "warning"
confirm_cycles = 3
message = "CPU has spent {iowait_avg_15m:.0f}% of recent time in I/O wait"
