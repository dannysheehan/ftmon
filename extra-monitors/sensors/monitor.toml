schema = 1

[monitor]
name = "sensors"
description = "Hardware sensor ALARM/FAULT status via check_sensors (lm_sensors)"
version = 1
enabled = false
platforms = ["linux"]
interval = "60s"
source = "external"

[source_options]
check = "sensors"
entity = "hw:sensors"

[[rule]]
id = "plugin-warning"
group = "sensors"
when = "plugin_state == 1"
severity = "warning"
confirm_cycles = 2
message = "{plugin_message}"

[[rule]]
id = "plugin-critical"
group = "sensors"
when = "plugin_state == 2"
severity = "critical"
confirm_cycles = 2
message = "{plugin_message}"

[[rule]]
id = "plugin-unknown"
group = "check-health"
when = "plugin_state == 3"
severity = "warning"
confirm_cycles = 2
message = "Sensors check is unknown: {plugin_message}"
