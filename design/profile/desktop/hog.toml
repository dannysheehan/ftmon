# FTMON desktop profile: CPU hog detector (SPEC 7.7.2)
# Calibrated on a GNOME dev workstation (docs/tuning-desktop-xps15.md).
schema = 1

exempt = [ 'matches(name, "^ftmon$")' ]

[monitor]
name = "hog"
description = "Detects processes with sustained high CPU use"
version = 3
enabled = true
platforms = ["linux"]
interval = "60s"
source = "process"

[parameters]
warn_pct = { value = 80, doc = "Warn when average CPU%% over 5m exceeds this" }
crit_pct = { value = 90, doc = "Error when average CPU%% over 15m exceeds this" }

# The warning and critical rules use different windows, so only the matching
# five-minute warning threshold belongs beside this five-minute readout.
[glance]
metric = "cpu_5m"
unit = "percent"
aggregate = "max"
thresholds = [
  { label = "warn", parameter = "warn_pct" },
]

[[rule]]
id = "hog-warn"
group = "hog"
when = 'avg(cpu_pct, "5m") > warn_pct'
severity = "warning"
confirm_cycles = 6
message = "{entity} hogging CPU: {cpu_5m:.0f}% avg over 5m"

[[rule]]
id = "hog-crit"
group = "hog"
when = 'avg(cpu_pct, "15m") > crit_pct'
severity = "error"
confirm_cycles = 6
message = "{entity} pegging CPU: {cpu_15m:.0f}% avg over 15m"

[[derived]]
name = "cpu_5m"
expr = 'avg(cpu_pct, "5m")'

[[derived]]
name = "cpu_15m"
expr = 'avg(cpu_pct, "15m")'
