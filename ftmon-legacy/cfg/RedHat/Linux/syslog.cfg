package RedHat::Linux::syslog;
$FT::PACKAGE = __PACKAGE__;

do "common.cfg";
do "impl/" . __FILE__;

sub FT::MONITOR::VARIABLES
{
  $MONITOR_INTERVAL_P = 1;
}

sub FT::MONITOR::THRESHOLDS
{
[
  [ '/.*/', ( $priority_V eq "emerg" ),   $FT::ESEV[10], $MSG_I, $MSG_M ],
  [ '/.*/',  ( $priority_V eq "alert" ),   $FT::ESEV[10], $MSG_I, $MSG_M ],
  [ '/.*/',  ( $priority_V eq "crit" ),    $FT::ESEV[7],  $MSG_I, $MSG_M ],
  [ '/.*/',  ( $priority_V eq "err" ),     $FT::ESEV[6],  $MSG_I, $MSG_M ],
  [ '/.*/',  ( $priority_V eq "warning" ), $FT::ESEV[5],  $MSG_I, $MSG_M ],
  [ '/.*/',  ( $priority_V eq "notice" ),  $FT::ESEV[3],  $MSG_I, $MSG_M ],
]
}

print "SOURCED: " . __FILE__ .  "\n";
