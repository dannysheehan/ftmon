package RedHat::Linux::disk;
$FT::PACKAGE = __PACKAGE__;

do "common.cfg";
do "impl/disk.cfg";
do "disk.bl";

sub FT::MONITOR::VARIABLES
{
  $MONITOR_INTERVAL_P= 1;
  $FILLING_INTERVAL_P = 10;
  $FILLING_SAMPLE_P = 1;
  $DISCOVER_INTERVAL_P = 10;
  $DISCOVER_SAMPLE_P = 1;
  $LEVEL1_P = 10;
  $LEVEL2_P = 20;
  $LEVEL3_P = 30;
};


sub FT::MONITOR::THRESHOLDS
{
[
[ '/.*/', ( $Filling_V == -1 ),  $FT::ESEV[6], $DISK_FILL_I,  $DISK_FILL_M ],
[ '/.*/', ( $IFilling_V == 1 ), $FT::ESEV[6], $INODE_FILL_I, $INODE_FILL_M ],
[ '/.*/', ( 1),  $FT::ESEV[0],  $RRD_I,  $RRD_M, $RRD_A ],
[ '/.*/', ( 1),  $FT::ESEV[0],  $IRRD_I,  $IRRD_M, $IRRD_A ],
[ ['/.*/'], ( $IPctUsed_V > 90 ), $FT::ESEV[9],  $INODE_I,  $INODE_M ],
[ ['/.*/'], ( $IPctUsed_V > 80 ), $FT::ESEV[7],  $INODE_I,  $INODE_M ],
[ ['/.*/'], ( $IPctUsed_V > 75 ), $FT::ESEV[5],  $INODE_I,  $INODE_M ],
[ ['/.*/'], ( $AvailMB_V < $AvailMB_BL3_V ), $FT::ESEV[9],  $DISK_I,  $DISK_BL3_M ],
[ ['/.*/'], ( $AvailMB_V < $AvailMB_BL2_V ), $FT::ESEV[7],  $DISK_I,  $DISK_BL2_M ],
[ ['/.*/'], ( $AvailMB_V < $AvailMB_BL1_V ),  $FT::ESEV[5],   $DISK_I,  $DISK_BL1_M ],
];
};
print "SOURCED: " . __FILE__ . "\n";
