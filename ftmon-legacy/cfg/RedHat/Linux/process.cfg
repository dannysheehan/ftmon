package RedHat::Linux::process;

$FT::PACKAGE = __PACKAGE__;

do "common.cfg";
do "impl/process.cfg";

sub FT::MONITOR::VARIABLES
{
  $MONITOR_INTERVAL_P = 1;
  $ACPU_INTERVAL_P = 5;
  $ACPU_SAMPLE_P = 1;
  $STORM_INTERVAL_P = 5;
  $STORM_SAMPLE_P = 5;
  $STATUS_MIN_CPU_P = 5;

  $MEM_LEAK_INTERVAL_P = 12;
  $MEM_LEAK_SAMPLE_P = 15;
 
  $NUM_TOP_MEM_USERS_P = 5;
}


sub FT::MONITOR::THRESHOLDS
{
[
 [ '/.*/', ( $ACPU_V > 5), $FT::ESEV[6], $PS_HOG_I, $PS_HOG_M, $RRD_CPU_A ],
 [ '/.*/', ( $STORM_V > 0 && $COUNT_V > 5), $FT::ESEV[6], $PS_STORM_I, $PS_STORM_M ],

  [ '/.*/', ( $SZ_Leak_V > 0 ), $FT::ESEV[6], $SZ_I,  $SZ_M, $RRD_SZ_A ],
  [ '/.*/', ( $VSZ_Leak_V > 0 ), $FT::ESEV[6], $VSZ_I,  $VSZ_M, $RRD_VSZ_A ],
  [ '/.*/', ( $RSS_Leak_V > 0 ), $FT::ESEV[6], $RSS_I,  $RSS_M, $RRD_RSS_A ],
]
}

print "SOURCED: " . __FILE__ . "\n";
