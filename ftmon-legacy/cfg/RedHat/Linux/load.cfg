package RedHat::Linux::load;
$FT::PACKAGE = __PACKAGE__;

do "common.cfg";
do "impl/load.cfg";

sub FT::MONITOR::VARIABLES
{
  $MONITOR_INTERVAL_P = 1;
}

sub FT::MONITOR::THRESHOLDS
{
[
  [ '', ( $Load15min_V > 4 ),  $FT::ESEV[9],  $LOAD15_I, $LOAD15_M ],
  [ '', ( $Load15min_V > 3 ),  $FT::ESEV[7],  $LOAD15_I, $LOAD15_M ],
  [ '', ( $Load15min_V > 2 ),  $FT::ESEV[5],  $LOAD15_I, $LOAD15_M ],

  [ '', ( $uptime_V < 10 ),  $FT::ESEV[5],  $REBOOT_I, $REBOOT_M ],

  [ '', ( 1 ),  $FT::ESEV[0],  $LOAD_RRD_I, $LOAD_RRD_M, $LOAD_RRD_A ],
]
}

print "SOURCED: " . __FILE__ .  "\n";
