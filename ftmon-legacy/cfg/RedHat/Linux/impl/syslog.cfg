# The syslog monitor scrapes syslog events for errors.
#
# KERN_EMERG    system is unusable               <br>
# KERN_ALERT    action must be taken immediately <br>
# KERN_CRIT     critical conditions              <br>
# KERN_ERR      error conditions                 <br>
# KERN_WARNING  warning conditions               <br>
# KERN_NOTICE   normal but significant condition <br>
# <br><br>
# You need the following entries in /etc/syslog.conf and syslogd 
# restarted.<br><br>
#*.emerg               /var/log/ftmon/emerg     <br>
#*.alert               /var/log/ftmon/alert     <br>
#*.crit                /var/log/ftmon/crit      <br>
#*.err                 /var/log/ftmon/err       <br>
#*.warning             /var/log/ftmon/warning   <br>
#*.notice              /var/log/ftmon/notice    <br>

do "impl/common.cfg";

$FT::MONITOR::DESC = "Monitor Unix syslog.";
$FT::MONITOR::VER  = "1.1";

sub FT::MONITOR::VARIABLES_INIT
{
  # Determines how often the monitor is invoked (in minutes). 
  $MONITOR_INTERVAL_P = 1;

  $LAST_EVENTID = "";

  $LOGS_P[0] = "/var/log/ftmon/emerg";
  $LOGS_P[1] = "/var/log/ftmon/alert";
  $LOGS_P[2] = "/var/log/ftmon/crit";
  $LOGS_P[3] = "/var/log/ftmon/err";
  $LOGS_P[4] = "/var/log/ftmon/warning";
  $LOGS_P[5] = "/var/log/ftmon/notice";
  $LOGS_P[6] = "/var/log/ftmon/info";
}


sub SCRAPER
{
  my $match = shift;
  my $repeat_count = shift;

  my $row = $_;
  return(1) if ( ! $row );

  my $id;
  my $date;
  my $hostname;
  my $origin;
  my $tag;
  my $msg;
  my @extra_fields;

#Dec 21 17:32:46 localhost kernel: klogd 1.4.1, log source = /proc/kmsg started.
#Dec 21 17:32:46 localhost syslog: syslogd shutdown succeeded 



#Dec 21 17:32:46 localhost syslog: syslogd shutdown succeeded 
  return 1 if ( ! /^(.+) (\d+) ([\d:]+) (.+) (.+): (.+)$/ );

  $month = $1;
  $day = $2;
  $time = $3;
  $host = $4;
  $tag = $5;
  $msg = $6;

  # Sometimes event log messages go over more than 1 line.
  if ( $msg =~ /^\s\s/ &&  
       $tag eq $match->{$LAST_EVENTID}->[1] )
  {
    $match->{$LAST_EVENTID}->[2] .= "$msg";
    return(1);
  }

  $date = "$month $day $time";

  $tag =~ s/\[.*\]//;

  $priority  = $FTMON::LogFileScraper::FILE_ID;
  $priority =~ s/^.*\///;


  # There is no unique id so generate psuedo-unique key from the
  # message by extracting all vowels and taking first 10 characters.
  $id = $msg;
  $id =~ s/[AEIOUaeiou\s\W]//g;
  $id = substr($id, 0, 10);

  $id  = "host='$host',tag='$tag',id='$id'";

  $origin   = $host;

  my $count = $repeat_count->{$id}++;
  $match->{$id} = 
     [ $id, $tag, $msg, $count,
       $date, $priority, $origin, 
       @extra_fields 
     ];

  $LAST_EVENTID = $id;
  return(1);
}

sub FT::MONITOR::PRECALCS
{
  #use FTMON::LogFileScraper;
  FTMON::LogFileScraper::scrape_log("syslog", \@LOGS_P, \&SCRAPER, 2);
  return(1);
}

sub FT::MONITOR::SCHED 
{ 
  FT::timer($MONITOR_INTERVAL_P) 
}

sub FT::MONITOR::COLS
{
 ( $event_id_V,
   $tag_V,
   $message_V,
   $count_V,
   $date_V,
   $priority_V,
   $origin_V,
   %FT::EXTRA_V ) = @_;

 $FT::RESOURCE = $event_id_V;
 #$FT::HOSTNAME = $origin_V;
}

sub FT::MONITOR::CALCS
{
  $MSG_I  = $FT::BASE_I . "/$event_id_V";
  $MSG_M = [0, $message_V];
}

sub FT::MONITOR::POSTCALCS
{
}

print "SOURCED: " . __FILE__ . "\n";
