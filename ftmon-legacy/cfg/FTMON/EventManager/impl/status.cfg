# Defines the adjustable variables specific to the EventManager status monitor
#
do "impl/common.cfg";

$FT::MONITOR::DESC = "Check health/status of the currently active EventManager.";
$FT::MONITOR::VER  = "1.1";

sub FT::MONITOR::VARIABLES_INIT
{
  # Determines how often the monitor is invoked (in minutes). 
  $MONITOR_INTERVAL_P = 1;

  # Determines how often sample is taken for event/minute calculation.
  $DELTA_SAMPLE_P = 1;

  # Determines number of consecutive cycles to calculate delta over.
  $DELTA_INTERVAL_P = 5;

  # The Class of Event Manager.
  $Type_V = "";

  # The Name associated with the Event Manager.
  $Name_V = "";

  # The number of events generated by the event manager since it was started.
  $NumEvents_V = 0;

  # The numbe of errors generated by the event manager since it was started.
  $NumErrors_V = 0;

  # An error message if there is an error associated with the Event Manager.
  $ErrorMsg_V = "";

  # The time the error first occurred.
  $ErrorTime_V = "";

  # increase in events since last sample.
  $NumEventsDelta_V  = 0;

  # increase in events that could not be sent since last sample.
  $NumErrorsDelta_V  = 0;

  # Time since last delta taken.
  $TimeDelta_V       = 0;

  # Number of events generated per minute.
  $NumEventsMinute_V = 0;

  # Number of error events generated per minute.
  $NumErrorsMinute_V = 0;
};


sub FT::MONITOR::PRECALCS
{
  my @stats = $FT::EVENT_MGR->getStats();
  my $name = $FT::EVENT_MGR->name();
  my $type = ref($FT::EVENT_MGR);
  push ( @FT::VALUES, [ $type, $name, @stats ] );

  @INFO = ();
  $FT::MONITOR::INFO{"status"} = \@INFO;
  return(1);
};

sub FT::MONITOR::SCHED 
{ 
  FT::timer(1) 
};


sub FT::MONITOR::COLS
{
  ( $Type_V,
    $Name_V,
    $NumEvents_V,
    $NumErrors_V,
    $ErrorMsg_V,
    $ErrorTime_V,
    %FT::EXTRA_V ) = @_;

  $FT::RESOURCE = ""
}


sub FT::MONITOR::CALCS 
{
    $NumEventsDelta_V  = FT::delta($DELTA_INTERVAL_P, $DELTA_SAMPLE_P, $NumEvents_V);
    $NumErrorsDelta_V  = FT::delta($DELTA_INTERVAL_P, $DELTA_SAMPLE_P, $NumErrors_V);
    $TimeDelta_V       = FT::delta($DELTA_INTERVAL_P, $DELTA_SAMPLE_P, time());
    $NumEventsMinute_V = 0;
    $NumEventsMinute_V = FT::round($NumEventsDelta_V / $TimeDelta_V * 60, 2)
         if ( $TimeDelta_V > 0 );
    $NumErrorsMinute_V = FT::round($NumErrorsDelta_V / $TimeDelta_V * 60, 2)
         if ( $TimeDelta_V > 0 );

    push(@INFO, 
      [
        [ "Type", $Type_V ],
        [ "Name", $Name_V ],
        [ "Events", $NumEvents_V ],
        [ "DeltaEvents", $NumEventsDelta_V ],
        [ "DeltaTime", $TimeDelta_V ],
        [ "Errors", $NumErrors_V ],
        [ "Events/min", $NumEventsMinute_V ],
        [ "Error Msg",  $ErrorMsg_V ],
      ]);

    $RRD_I = $FT::BASE_I . "/" . "Graph";
    $RRD_M = [0, "Graph" ];
    $RRD_A = [0, -1, sub {FT::rrd([*NumEventsMinute_V])} ];
};


sub FT::MONITOR::POSTCALCS
{
};


print "SOURCED: " . __FILE__ . "\n";

1;
